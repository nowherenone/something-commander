appId: com.somewhat-commander.app
productName: Somewhat Commander
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!e2e/*'
  - '!plugin-template/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{vitest.config.ts,vite.test.config.ts,playwright.config.ts}'
asarUnpack:
  - resources/**

# Windows
win:
  executableName: somewhat-commander
  signAndEditExecutable: false
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
    - target: dir
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  artifactName: Somewhat-Commander-${version}-setup.${ext}
  shortcutName: Somewhat Commander
  uninstallDisplayName: Somewhat Commander
  createDesktopShortcut: always
  createStartMenuShortcut: true

# macOS
mac:
  icon: build/icon.icns
  entitlementsInherit: build/entitlements.mac.plist
  notarize: false
  target:
    - target: dmg
      arch:
        - x64
        - arm64
dmg:
  artifactName: Somewhat-Commander-${version}.${ext}

# Linux
linux:
  icon: build/icon.png
  target:
    - target: deb
      arch:
        - x64
    - target: AppImage
      arch:
        - x64
  maintainer: Somewhat Commander Contributors
  category: Utility
  description: A modern orthodox two-panel file manager
deb:
  artifactName: somewhat-commander-${version}.${ext}
appImage:
  artifactName: Somewhat-Commander-${version}.${ext}

npmRebuild: false
